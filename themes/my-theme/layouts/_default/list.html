{{ define "main" }}
<section class="section">
  <div class="content">
    <h1>All Tags</h1>

    <ul class="tag-list">
      {{ range .Data.Terms.Alphabetical }}
      <li>
        <a href="{{ .Page.RelPermalink }}">
          {{ .Page.Title }} ({{ .Count }})
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
